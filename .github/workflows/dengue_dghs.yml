name: Update Dengue CSV

permissions:
  contents: write

on:
  schedule:
    - cron: "0 11 * * *"   # 05:00 PM Bangladesh time
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      GSHEET_JSON: ${{ secrets.GSHEET_JSON }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # Setup R
      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      # Install system dependencies (needed for some R packages)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      # Install + cache R packages (FAST 🚀)
      - name: Setup dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            httr
            stringr
            jsonlite
            dplyr
            readr
            googlesheets4
          extra-repositories: https://packagemanager.posit.co/cran/latest

      # Run your script
      - name: Run scraping script
        run: |
          Rscript dghs_dengue_dashboard_fetching.R
