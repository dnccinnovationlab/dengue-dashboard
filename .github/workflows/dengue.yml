name: Dengue Daily Update

on:
  schedule:
    - cron: "30 11 * * *"   # daily at 5:30 PM Bangladesh time
  workflow_dispatch:

jobs:
  run-dengue:
    runs-on: ubuntu-latest

    env:
      GSHEET_JSON: ${{ secrets.GSHEET_JSON }}
      GMAPS_API_KEY: ${{ secrets.GMAPS_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Setup R
      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      # System dependencies (needed for sf, etc.)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudunits2-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev

      # Install + cache R packages (FAST 🚀)
      - name: Setup dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            lubridate
            sf
            googlesheets4
            ggmap
            zoo
            readr
            sp
            dplyr
            tidyr
          extra-repositories: https://packagemanager.posit.co/cran/latest

      # Run pipeline
      - name: Run dengue pipeline
        run: Rscript run_all.R
